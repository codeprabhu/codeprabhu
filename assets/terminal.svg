```svg
<svg width="1200" height="400" viewBox="0 0 1200 400"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Catppuccin Mocha Background -->
  <rect width="1200" height="400" rx="20" fill="#1e1e2e"/>

  <!-- Terminal Title Bar -->
  <rect width="1200" height="50" rx="20" fill="#313244"/>

  <!-- MacOS style buttons -->
  <circle cx="30" cy="25" r="8" fill="#f38ba8"/>
  <circle cx="60" cy="25" r="8" fill="#f9e2af"/>
  <circle cx="90" cy="25" r="8" fill="#a6e3a1"/>

  <!-- Terminal Title -->
  <text x="130" y="32"
        fill="#cdd6f4"
        font-size="18"
        font-family="monospace">
    shrivaths@endeavouros
  </text>

  <!-- Content -->
  <text x="40" y="100"
        fill="#89b4fa"
        font-size="24"
        font-family="monospace">
    $ whoami
  </text>

  <text x="40" y="140"
        fill="#cdd6f4"
        font-size="24"
        font-family="monospace">
    Shrivaths S Prabhu
  </text>

  <text x="40" y="200"
        fill="#89b4fa"
        font-size="24"
        font-family="monospace">
    $ uname -a
  </text>

  <text x="40" y="240"
        fill="#cdd6f4"
        font-size="24"
        font-family="monospace">
    EndeavourOS Linux
  </text>

  <text x="40" y="300"
        fill="#89b4fa"
        font-size="24"
        font-family="monospace">
    $ █
  </text>

  <!-- Blinking Cursor -->
  <rect x="85" y="278"
        width="15"
        height="25"
        fill="#f5c2e7">

      <animate
          attributeName="opacity"
          values="1;0;1"
          dur="1s"
          repeatCount="indefinite"/>
  </rect>

</svg>
```

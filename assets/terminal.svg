<svg width="1200" height="750" viewBox="0 0 1200 750"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="eosGradient"
                    x1="0%" y1="0%"
                    x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7edb"/>
      <stop offset="35%" stop-color="#d38cff"/>
      <stop offset="70%" stop-color="#8c9eff"/>
      <stop offset="100%" stop-color="#6aa9ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="#0f111a"/>

  <!-- Top Prompt -->
  <text x="40" y="60"
        fill="#a6e3a1"
        font-size="28"
        font-family="monospace">➜</text>

  <text x="75" y="60"
        fill="#89b4fa"
        font-size="28"
        font-family="monospace">~</text>

  <text x="115" y="60"
        fill="#cdd6f4"
        font-size="28"
        font-family="monospace">fastfetch</text>

<!-- ASCII Logo -->
<text x="40"
      y="170"
      fill="url(#eosGradient)"
      font-size="22"
      font-family="monospace"
      xml:space="preserve">

  <tspan x="40" dy="0">                     ./o.</tspan>
  <tspan x="40" dy="24">                   ./sssso-</tspan>
  <tspan x="40" dy="24">                 `:osssssss+-</tspan>
  <tspan x="40" dy="24">               `:+sssssssssso/.</tspan>
  <tspan x="40" dy="24">             `-/ossssssssssssso/.</tspan>
  <tspan x="40" dy="24">           `-/+sssssssssssssssso+:`</tspan>
  <tspan x="40" dy="24">         `-:/+sssssssssssssssssso+/.</tspan>
  <tspan x="40" dy="24">       `.://osssssssssssssssssssso++-</tspan>
  <tspan x="40" dy="24">      .://+ssssssssssssssssssssssso++:</tspan>
  <tspan x="40" dy="24">    .:///ossssssssssssssssssssssssso++:</tspan>
  <tspan x="40" dy="24">  `:////ssssssssssssssssssssssssssso+++.</tspan>
  <tspan x="40" dy="24">`-////+ssssssssssssssssssssssssssso++++-</tspan>
  <tspan x="40" dy="24"> `..-+oosssssssssssssssssssssssso+++++/`</tspan>
  <tspan x="40" dy="24">   ./++++++++++++++++++++++++++++++/:.</tspan>
  <tspan x="40" dy="24">  `:::::::::::::::::::::::::------``</tspan>

</text>

  <!-- Username -->
  <text x="620" y="140"
        fill="#f38ba8"
        font-size="28"
        font-family="monospace">
    shrivaths@endeavouros
  </text>

  <text x="620" y="175"
        fill="#6c7086"
        font-size="24"
        font-family="monospace">
    ---------------------
  </text>

  <!-- Labels -->
  <text x="620" y="230" fill="#cba6f7" font-size="24" font-family="monospace">OS:</text>
  <text x="620" y="270" fill="#cba6f7" font-size="24" font-family="monospace">Shell:</text>
  <text x="620" y="310" fill="#cba6f7" font-size="24" font-family="monospace">Terminal:</text>
  <text x="620" y="350" fill="#cba6f7" font-size="24" font-family="monospace">Theme:</text>
  <text x="620" y="390" fill="#cba6f7" font-size="24" font-family="monospace">Editor:</text>
  <text x="620" y="430" fill="#cba6f7" font-size="24" font-family="monospace">Languages:</text>
  <text x="620" y="470" fill="#cba6f7" font-size="24" font-family="monospace">Focus:</text>
  <text x="620" y="590" fill="#cba6f7" font-size="24" font-family="monospace">Projects:</text>

  <!-- Values -->
  <text x="800" y="230" fill="#cdd6f4" font-size="24" font-family="monospace">EndeavourOS Linux</text>
  <text x="800" y="270" fill="#cdd6f4" font-size="24" font-family="monospace">zsh</text>
  <text x="800" y="310" fill="#cdd6f4" font-size="24" font-family="monospace">xfce4-terminal</text>
  <text x="800" y="350" fill="#cdd6f4" font-size="24" font-family="monospace">Catppuccin Mocha</text>
  <text x="800" y="390" fill="#cdd6f4" font-size="24" font-family="monospace">VS Code</text>
  <text x="800" y="430" fill="#cdd6f4" font-size="24" font-family="monospace">C++, Python, C#</text>

  <text x="800" y="470" fill="#cdd6f4" font-size="24" font-family="monospace">
    Competitive Programming
  </text>

  <text x="800" y="510" fill="#cdd6f4" font-size="24" font-family="monospace">
    AI / ML
  </text>

  <text x="800" y="550" fill="#cdd6f4" font-size="24" font-family="monospace">
    Open Source
  </text>

  <text x="800" y="590" fill="#cdd6f4" font-size="24" font-family="monospace">
    GlitchHoppers
  </text>

  <text x="800" y="630" fill="#cdd6f4" font-size="24" font-family="monospace">
    KrystalRun
  </text>

  <text x="800" y="670" fill="#cdd6f4" font-size="24" font-family="monospace">
    BITSCTF_BITSkrieg
  </text>

  <!-- Bottom Prompt -->
  <text x="40" y="720"
        fill="#a6e3a1"
        font-size="28"
        font-family="monospace">➜</text>

  <text x="75" y="720"
        fill="#89b4fa"
        font-size="28"
        font-family="monospace">~</text>

  <!-- Cursor -->
  <rect x="115"
        y="692"
        width="18"
        height="30"
        fill="#f5c2e7">

    <animate
      attributeName="opacity"
      values="1;0;1"
      dur="1s"
      repeatCount="indefinite"/>
  </rect>

</svg>

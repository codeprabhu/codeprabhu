<svg width="1200" height="820" viewBox="0 0 1200 820"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="eosGradient"
                    x1="0%" y1="0%"
                    x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7edb"/>
      <stop offset="35%" stop-color="#d38cff"/>
      <stop offset="70%" stop-color="#8c9eff"/>
      <stop offset="100%" stop-color="#6aa9ff"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0f111a"/>

  <!-- Top Prompt -->
  <text x="40" y="60"
        fill="#a6e3a1"
        font-size="28"
        font-family="monospace">➜</text>

  <text x="75" y="60"
        fill="#89b4fa"
        font-size="28"
        font-family="monospace">~</text>

  <text x="115" y="60"
        fill="#cdd6f4"
        font-size="28"
        font-family="monospace">fastfetch</text>

 <!-- ASCII Logo -->
<g transform="translate(20,210) scale(1.25)">

  <text
      fill="url(#eosGradient)"
      filter="url(#glow)"
      font-size="22"
      font-family="monospace"
      xml:space="preserve">

    <tspan x="0" dy="0">                     ./o.</tspan>
    <tspan x="0" dy="24">                   ./sssso-</tspan>
    <tspan x="0" dy="24">                 `:osssssss+-</tspan>
    <tspan x="0" dy="24">               `:+sssssssssso/.</tspan>
    <tspan x="0" dy="24">             `-/ossssssssssssso/.</tspan>
    <tspan x="0" dy="24">           `-/+sssssssssssssssso+:`</tspan>
    <tspan x="0" dy="24">         `-:/+sssssssssssssssssso+/.</tspan>
    <tspan x="0" dy="24">       `.://osssssssssssssssssssso++-</tspan>
    <tspan x="0" dy="24">      .://+ssssssssssssssssssssssso++:</tspan>
    <tspan x="0" dy="24">    .:///ossssssssssssssssssssssssso++:</tspan>
    <tspan x="0" dy="24">  `:////ssssssssssssssssssssssssssso+++.</tspan>
    <tspan x="0" dy="24">`-////+ssssssssssssssssssssssssssso++++-</tspan>
    <tspan x="0" dy="24"> `..-+oosssssssssssssssssssssssso+++++/`</tspan>
    <tspan x="0" dy="24">   ./++++++++++++++++++++++++++++++/:.</tspan>
    <tspan x="0" dy="24">  `:::::::::::::::::::::::::------``</tspan>

  </text>

</g>

  <!-- Username -->
  <text x="680" y="190"
        fill="#f5c2e7"
        font-size="30"
        font-family="monospace"
        font-weight="bold">
    shrivaths@endeavouros
  </text>

  <text x="680" y="225"
        fill="#6c7086"
        font-size="24"

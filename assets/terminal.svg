<svg width="1200" height="820" viewBox="0 0 1200 820"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="eosGradient"
                    x1="0%" y1="0%"
                    x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7edb"/>
      <stop offset="35%" stop-color="#d38cff"/>
      <stop offset="70%" stop-color="#8c9eff"/>
      <stop offset="100%" stop-color="#6aa9ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0f111a"/>

  <!-- Top Prompt -->
  <text x="40" y="60"
        fill="#a6e3a1"
        font-size="28"
        font-family="monospace">➜</text>

  <text x="75" y="60"
        fill="#89b4fa"
        font-size="28"
        font-family="monospace">~</text>

  <text x="115" y="60"
        fill="#cdd6f4"
        font-size="28"
        font-family="monospace">fastfetch</text>

  <!-- ASCII Logo -->
  <text x="40"
        y="200"
        fill="url(#eosGradient)"
        font-size="24"
        font-family="monospace"
        xml:space="preserve">

    <tspan x="40" dy="0">                     ./o.</tspan>
    <tspan x="40" dy="24">                   ./sssso-</tspan>
    <tspan x="40" dy="24">                 `:osssssss+-</tspan>
    <tspan x="40" dy="24">               `:+sssssssssso/.</tspan>
    <tspan x="40" dy="24">             `-/ossssssssssssso/.</tspan>
    <tspan x="40" dy="24">           `-/+sssssssssssssssso+:`</tspan>
    <tspan x="40" dy="24">         `-:/+sssssssssssssssssso+/.</tspan>
    <tspan x="40" dy="24">       `.://osssssssssssssssssssso++-</tspan>
    <tspan x="40" dy="24">      .://+ssssssssssssssssssssssso++:</tspan>
    <tspan x="40" dy="24">    .:///ossssssssssssssssssssssssso++:</tspan>
    <tspan x="40" dy="24">  `:////ssssssssssssssssssssssssssso+++.</tspan>
    <tspan x="40" dy="24">`-////+ssssssssssssssssssssssssssso++++-</tspan>
    <tspan x="40" dy="24"> `..-+oosssssssssssssssssssssssso+++++/`</tspan>
    <tspan x="40" dy="24">   ./++++++++++++++++++++++++++++++/:.</tspan>
    <tspan x="40" dy="24">  `:::::::::::::::::::::::::------``</tspan>

  </text>

  <!-- Username -->
  <text x="680" y="190"
        fill="#f38ba8"
        font-size="30"
        font-family="monospace"
        font-weight="bold">
    shrivaths@endeavouros
  </text>

  <text x="680" y="225"
        fill="#6c7086"
        font-size="24"
        font-family="monospace">
    ----------------------
  </text>

  <!-- Labels -->
  <text x="680" y="280" fill="#cba6f7" font-size="24" font-family="monospace">OS:</text>
  <text x="680" y="320" fill="#cba6f7" font-size="24" font-family="monospace">Shell:</text>
  <text x="680" y="360" fill="#cba6f7" font-size="24" font-family="monospace">Terminal:</text>
  <text x="680" y="400" fill="#cba6f7" font-size="24" font-family="monospace">Theme:</text>
  <text x="680" y="640" fill="#cba6f7" font-size="24" font-family="monospace">Projects:</text>

  <!-- Values -->
  <text x="850" y="280" fill="#cdd6f4" font-size="24" font-family="monospace">EndeavourOS Linux</text>
  <text x="850" y="320" fill="#cdd6f4" font-size="24" font-family="monospace">zsh</text>
  <text x="850" y="360" fill="#cdd6f4" font-size="24" font-family="monospace">xfce4-terminal</text>
  <text x="850" y="400" fill="#cdd6f4" font-size="24" font-family="monospace">Catppuccin Mocha</text>

  <text x="850" y="640" fill="#cdd6f4" font-size="24" font-family="monospace">
    GlitchHoppers
  </text>

  <text x="850" y="680" fill="#cdd6f4" font-size="24" font-family="monospace">
    KrystalRun
  </text>


  <!-- Bottom Prompt -->
  <text x="40" y="790"
        fill="#a6e3a1"
        font-size="28"
        font-family="monospace">➜</text>

  <text x="75" y="790"
        fill="#89b4fa"
        font-size="28"
        font-family="monospace">~</text>

  <!-- Blinking Cursor -->
  <rect x="115"
        y="762"
        width="18"
        height="30"
        fill="#f5c2e7">

    <animate
      attributeName="opacity"
      values="1;0;1"
      dur="1s"
      repeatCount="indefinite"/>
  </rect>

</svg>
